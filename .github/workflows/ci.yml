name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.15.0
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and test the study extension
        run: pnpm verify

  storage-provider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/storage-provider-go/go.mod
          cache-dependency-path: services/storage-provider-go/go.sum
      - name: Test the distributed reference service
        run: go -C services/storage-provider-go test ./...
